name: Publish

on:
  workflow_dispatch:

jobs:
  publish:
    # PyPI publishing is intentionally manual while the project is in
    # GitHub-only research-release mode. Re-enable release triggers only after
    # the benchmark-supported PyPI release decision is made.
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Build distributions
        run: uv run --with build python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
